<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="LexiPrep"/>
<title>LexiPrep – Vocab for Competitive Exams</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --card: #1a1a28;
    --accent: #c8a45a;
    --accent2: #7c6cff;
    --text: #e8e4d8;
    --muted: #6b6878;
    --green: #4caf7d;
    --red: #e05c6a;
    --border: #2a2a3d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── HOME ── */
  #home {
    padding: 0;
    background: radial-gradient(ellipse at 20% 10%, #1c1630 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, #1a1220 0%, transparent 55%),
                var(--bg);
  }
  .home-header {
    padding: 60px 28px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(200,164,90,0.1); border: 1px solid rgba(200,164,90,0.3);
    border-radius: 100px; padding: 6px 14px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 24px;
  }
  h1.hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 14vw, 72px);
    font-weight: 900;
    line-height: 1.0;
    color: var(--text);
    margin-bottom: 8px;
  }
  h1.hero-title span { color: var(--accent); }
  .hero-sub {
    font-size: 15px; color: var(--muted); font-weight: 300;
    line-height: 1.6; margin-bottom: 48px; max-width: 320px;
  }
  .stats-row {
    display: flex; gap: 20px; margin-bottom: 40px;
  }
  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 20px; flex: 1;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700; color: var(--accent);
  }
  .stat-lbl { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .home-btns { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #a8844a);
    color: #0a0a0f; border: none; border-radius: 16px;
    padding: 18px 28px; font-size: 16px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 32px rgba(200,164,90,0.25);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 18px 28px; font-size: 16px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .btn-secondary:active { transform: scale(0.97); }

  /* ── QUIZ ── */
  #quiz {
    padding: 0;
    background: var(--bg);
  }
  .quiz-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    background: none; border: none; color: var(--muted);
    font-size: 22px; cursor: pointer; padding: 4px;
  }
  .quiz-progress-label {
    font-size: 13px; color: var(--muted); font-weight: 500;
  }
  .score-chip {
    background: rgba(200,164,90,0.12); color: var(--accent);
    border-radius: 100px; padding: 4px 12px; font-size: 13px; font-weight: 600;
  }
  .progress-bar-wrap {
    height: 3px; background: var(--border); margin: 0;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease; border-radius: 0 2px 2px 0;
  }
  .quiz-body {
    flex: 1; display: flex; flex-direction: column;
    padding: 28px 24px 20px; gap: 24px;
  }
  .word-card {
    background: linear-gradient(135deg, #1e1e30, var(--card));
    border: 1px solid var(--border); border-radius: 24px;
    padding: 32px 24px; text-align: center;
    position: relative; overflow: hidden;
  }
  .word-card::before {
    content: '"'; position: absolute; top: -20px; left: 12px;
    font-family: 'Playfair Display', serif; font-size: 120px;
    color: rgba(200,164,90,0.06); line-height: 1;
  }
  .word-pos {
    display: inline-block; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent2);
    background: rgba(124,108,255,0.1); border-radius: 100px;
    padding: 3px 10px; margin-bottom: 14px; font-weight: 500;
  }
  .word-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 10vw, 52px); font-weight: 900;
    color: var(--text); letter-spacing: -1px; line-height: 1.1;
    margin-bottom: 10px;
  }
  .word-phonetic {
    font-size: 14px; color: var(--muted); font-style: italic;
    font-weight: 300; margin-bottom: 6px;
  }
  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .option-btn {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 16px 12px;
    font-size: 14px; font-weight: 400;
    font-family: 'DM Sans', sans-serif; color: var(--text);
    cursor: pointer; transition: all 0.2s; line-height: 1.3;
    text-align: center; min-height: 64px;
    display: flex; align-items: center; justify-content: center;
  }
  .option-btn:active { transform: scale(0.97); }
  .option-btn.correct {
    background: rgba(76,175,125,0.15);
    border-color: var(--green); color: var(--green);
  }
  .option-btn.wrong {
    background: rgba(224,92,106,0.12);
    border-color: var(--red); color: var(--red);
  }
  .option-btn.disabled { cursor: default; }
  .feedback-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 20px;
    font-size: 14px; line-height: 1.6; color: var(--muted);
    min-height: 80px;
  }
  .feedback-box .fb-word { color: var(--accent); font-weight: 600; }
  .feedback-box .fb-example { font-style: italic; margin-top: 6px; display: block; }
  .next-btn {
    background: var(--accent2); color: #fff; border: none;
    border-radius: 14px; padding: 16px; font-size: 15px;
    font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    opacity: 0; pointer-events: none;
  }
  .next-btn.show { opacity: 1; pointer-events: all; }
  .next-btn:active { transform: scale(0.97); }

  /* ── FLASHCARD ── */
  #flashcard {
    padding: 0;
    background: radial-gradient(ellipse at 70% 20%, #12102a 0%, transparent 55%), var(--bg);
  }
  .fc-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 12px; border-bottom: 1px solid var(--border);
  }
  .fc-body {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px 24px; gap: 20px;
  }
  .flashcard-wrap {
    width: 100%; perspective: 1000px;
    cursor: pointer;
  }
  .flashcard-inner {
    width: 100%; transition: transform 0.55s;
    transform-style: preserve-3d; position: relative;
    min-height: 260px;
  }
  .flashcard-wrap.flipped .flashcard-inner { transform: rotateY(180deg); }
  .fc-face {
    position: absolute; width: 100%; top: 0; left: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: linear-gradient(135deg, #1a1a2e, #1e1a35);
    border: 1px solid var(--border); border-radius: 24px;
    padding: 40px 28px; text-align: center;
    min-height: 260px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .fc-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #1a2818, #182018);
    border-color: rgba(76,175,125,0.25);
  }
  .fc-face .tap-hint {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-top: 16px;
  }
  .fc-word {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 12vw, 58px); font-weight: 900;
    color: var(--text); line-height: 1.1;
  }
  .fc-pos {
    font-size: 11px; color: var(--accent2); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 10px; font-weight: 500;
  }
  .fc-meaning {
    font-size: 18px; font-weight: 500; color: var(--text);
    line-height: 1.4; margin-bottom: 12px;
  }
  .fc-example {
    font-size: 13px; color: var(--muted); font-style: italic;
    line-height: 1.5;
  }
  .fc-counter {
    font-size: 13px; color: var(--muted);
    font-family: 'Playfair Display', serif; font-weight: 700;
  }
  .fc-nav {
    display: flex; gap: 12px; width: 100%;
  }
  .fc-nav button {
    flex: 1; padding: 16px; border-radius: 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif; border: 1.5px solid var(--border);
    transition: transform 0.15s;
  }
  .fc-nav button:active { transform: scale(0.97); }
  .fc-prev { background: var(--card); color: var(--text); }
  .fc-next { background: var(--accent); color: #0a0a0f; border-color: var(--accent) !important; }

  /* ── RESULT ── */
  #result {
    align-items: center; justify-content: center;
    padding: 32px 28px; text-align: center;
    background: radial-gradient(ellipse at 50% 40%, #1c152a 0%, transparent 65%), var(--bg);
  }
  .result-icon {
    font-size: 72px; margin-bottom: 16px;
    animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 900; color: var(--text); margin-bottom: 8px;
  }
  .result-subtitle { font-size: 15px; color: var(--muted); margin-bottom: 32px; }
  .result-score-ring {
    width: 140px; height: 140px; border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--card) 0);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px;
    box-shadow: 0 0 40px rgba(200,164,90,0.2);
  }
  .result-score-inner {
    width: 110px; height: 110px; border-radius: 50%;
    background: var(--bg); display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .result-score-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 900; color: var(--accent); line-height: 1;
  }
  .result-score-den { font-size: 12px; color: var(--muted); }
  .result-grade {
    display: inline-block; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; padding: 6px 18px; border-radius: 100px;
    font-weight: 600; margin-bottom: 32px;
  }
  .grade-A { background: rgba(76,175,125,0.15); color: var(--green); }
  .grade-B { background: rgba(200,164,90,0.15); color: var(--accent); }
  .grade-C { background: rgba(124,108,255,0.15); color: var(--accent2); }
  .grade-D { background: rgba(224,92,106,0.12); color: var(--red); }
  .result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }

  /* BOTTOM NAV */
  .bottom-nav {
    display: flex; background: var(--surface); border-top: 1px solid var(--border);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 8px; cursor: pointer; gap: 4px; background: none; border: none;
    transition: opacity 0.2s;
  }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; }
  .nav-item.active .nav-label { color: var(--accent); }

  .screen-fade { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active screen-fade">
  <div class="home-header">
    <div class="logo-badge">📖 LexiPrep</div>
    <h1 class="hero-title">Master<br/>Every<br/><span>Word.</span></h1>
    <p class="hero-sub">High-frequency vocabulary for BCS, GRE, IELTS & all competitive exams.</p>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="totalWords">100</div>
        <div class="stat-lbl">Words</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="masteredCount">0</div>
        <div class="stat-lbl">Mastered</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="streakCount">0</div>
        <div class="stat-lbl">Streak</div>
      </div>
    </div>
    <div class="home-btns">
      <button class="btn-primary" onclick="startQuiz()">⚡ Start Quiz</button>
      <button class="btn-secondary" onclick="showScreen('flashcard'); loadFlashcard()">📇 Flashcards</button>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showScreen('home')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item" onclick="startQuiz()"><span class="nav-icon">⚡</span><span class="nav-label">Quiz</span></button>
    <button class="nav-item" onclick="showScreen('flashcard'); loadFlashcard()"><span class="nav-icon">📇</span><span class="nav-label">Cards</span></button>
  </nav>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-topbar">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <span class="quiz-progress-label" id="quizProgress">1 / 10</span>
    <span class="score-chip" id="scoreChip">0 pts</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="quiz-body">
    <div class="word-card">
      <div class="word-pos" id="wordPos">noun</div>
      <div class="word-main" id="wordMain">–</div>
      <div class="word-phonetic" id="wordPhonetic">/–/</div>
    </div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="feedback-box" id="feedbackBox">Choose the correct definition above.</div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Word →</button>
  </div>
</div>

<!-- FLASHCARD -->
<div id="flashcard" class="screen">
  <div class="fc-topbar">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <span class="quiz-progress-label">Flashcards</span>
    <span class="fc-counter" id="fcCounter">1 / 100</span>
  </div>
  <div class="fc-body">
    <div class="flashcard-wrap" id="flashcardWrap" onclick="flipCard()">
      <div class="flashcard-inner" id="flashcardInner">
        <div class="fc-face fc-front">
          <div class="fc-pos" id="fcPos">noun</div>
          <div class="fc-word" id="fcWord">–</div>
          <div class="tap-hint">tap to reveal</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-pos" id="fcPos2">noun</div>
          <div class="fc-meaning" id="fcMeaning">–</div>
          <div class="fc-example" id="fcExample">–</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="fc-prev" onclick="fcMove(-1)">← Prev</button>
      <button class="fc-next" onclick="fcMove(1)">Next →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-icon" id="resultIcon">🎯</div>
  <div class="result-title" id="resultTitle">Quiz Complete!</div>
  <div class="result-subtitle" id="resultSubtitle">Here's how you did</div>
  <div class="result-score-ring" id="resultRing" style="--pct:0">
    <div class="result-score-inner">
      <div class="result-score-num" id="resultNum">0</div>
      <div class="result-score-den" id="resultDen">/ 10</div>
    </div>
  </div>
  <div class="result-grade" id="resultGrade">—</div>
  <div class="result-btns">
    <button class="btn-primary" onclick="startQuiz()">🔄 Try Again</button>
    <button class="btn-secondary" onclick="showScreen('home')">🏠 Home</button>
  </div>
</div>

<script>
const WORDS = [
  {word:"Abate",pos:"verb",phonetic:"/əˈbeɪt/",meaning:"To reduce in intensity or amount",example:"The storm finally began to abate after hours of heavy rain."},
  {word:"Acrimony",pos:"noun",phonetic:"/ˈækrɪməni/",meaning:"Bitterness or ill feeling in speech or manner",example:"The divorce was marked by considerable acrimony between the two parties."},
  {word:"Adroit",pos:"adjective",phonetic:"/əˈdrɔɪt/",meaning:"Clever or skillful in using the hands or mind",example:"She was adroit at handling difficult negotiations with clients."},
  {word:"Alacrity",pos:"noun",phonetic:"/əˈlækrɪti/",meaning:"Brisk and cheerful readiness",example:"He accepted the challenge with alacrity, eager to prove himself."},
  {word:"Ambiguous",pos:"adjective",phonetic:"/æmˈbɪɡjuəs/",meaning:"Open to more than one interpretation; unclear",example:"The politician gave an ambiguous answer that satisfied no one."},
  {word:"Ameliorate",pos:"verb",phonetic:"/əˈmiːliəreɪt/",meaning:"To make something bad or unsatisfactory better",example:"Aid agencies worked to ameliorate the suffering caused by the famine."},
  {word:"Anachronism",pos:"noun",phonetic:"/əˈnækrənɪzəm/",meaning:"A thing belonging to a period other than that in which it exists",example:"The use of a quill pen in 2025 would be an anachronism."},
  {word:"Anomaly",pos:"noun",phonetic:"/əˈnɒməli/",meaning:"Something that deviates from what is standard or expected",example:"The scientist noticed an anomaly in the experimental data."},
  {word:"Antipathy",pos:"noun",phonetic:"/ænˈtɪpəθi/",meaning:"A deep-seated feeling of dislike; aversion",example:"She felt a strong antipathy towards dishonest people."},
  {word:"Apathy",pos:"noun",phonetic:"/ˈæpəθi/",meaning:"Lack of interest, enthusiasm, or concern",example:"Voter apathy led to the lowest turnout in decades."},
  {word:"Arcane",pos:"adjective",phonetic:"/ɑːrˈkeɪn/",meaning:"Understood by few; mysterious or secret",example:"The professor was known for his arcane knowledge of medieval manuscripts."},
  {word:"Arduous",pos:"adjective",phonetic:"/ˈɑːrdʒuəs/",meaning:"Involving or requiring strenuous effort; difficult",example:"The arduous climb to the summit took eight hours."},
  {word:"Articulate",pos:"adjective",phonetic:"/ɑːrˈtɪkjulɪt/",meaning:"Having or showing the ability to speak fluently and coherently",example:"She was an articulate spokesperson who expressed ideas with clarity."},
  {word:"Ascetic",pos:"adjective",phonetic:"/əˈsɛtɪk/",meaning:"Characterized by severe self-discipline and abstention",example:"The monk led an ascetic life, owning almost nothing."},
  {word:"Assuage",pos:"verb",phonetic:"/əˈsweɪdʒ/",meaning:"To make an unpleasant feeling less intense",example:"Nothing could assuage her grief after losing her father."},
  {word:"Astute",pos:"adjective",phonetic:"/əˈstjuːt/",meaning:"Having the ability to assess situations very accurately",example:"The astute investor predicted the market crash months in advance."},
  {word:"Atrophy",pos:"verb",phonetic:"/ˈætrəfi/",meaning:"To gradually decline in effectiveness or vigor",example:"Without regular exercise, muscles begin to atrophy."},
  {word:"Audacious",pos:"adjective",phonetic:"/ɔːˈdeɪʃəs/",meaning:"Showing a willingness to take bold risks",example:"The audacious heist plan required perfect timing and nerves of steel."},
  {word:"Austere",pos:"adjective",phonetic:"/ɒˈstɪər/",meaning:"Severe or strict in manner; without luxury",example:"The judge was known for his austere courtroom demeanor."},
  {word:"Avarice",pos:"noun",phonetic:"/ˈævərɪs/",meaning:"Extreme greed for wealth or material gain",example:"His avarice led him to embezzle funds from his own company."},
  {word:"Banal",pos:"adjective",phonetic:"/bəˈnɑːl/",meaning:"Lacking originality; boring and uninteresting",example:"The speech was full of banal phrases that failed to inspire anyone."},

let quizWords = [], currentQ = 0, score = 0, answered = false;
let fcIndex = 0, mastered = 0, streak = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active','screen-fade'));
  const el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(() => el.classList.add('screen-fade'), 10);
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  quizWords = shuffle(WORDS).slice(0, 10);
  currentQ = 0; score = 0; answered = false;
  document.getElementById('scoreChip').textContent = '0 pts';
  showScreen('quiz');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const w = quizWords[currentQ];
  document.getElementById('wordPos').textContent = w.pos;
  document.getElementById('wordMain').textContent = w.word;
  document.getElementById('wordPhonetic').textContent = w.phonetic;
  document.getElementById('quizProgress').textContent = `${currentQ + 1} / 10`;
  document.getElementById('progressFill').style.width = `${(currentQ / 10) * 100}%`;
  document.getElementById('feedbackBox').innerHTML = 'Choose the correct definition above.';
  document.getElementById('nextBtn').classList.remove('show');

  // Build options
  const others = shuffle(WORDS.filter(x => x.word !== w.word)).slice(0, 3);
  const options = shuffle([w, ...others]);
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.meaning;
    btn.onclick = () => checkAnswer(opt.word === w.word, btn, w);
    grid.appendChild(btn);
  });
}

function checkAnswer(correct, btn, w) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.classList.add('disabled');
    if (b.textContent === w.meaning) b.classList.add('correct');
  });
  if (correct) {
    btn.classList.add('correct');
    score += 10;
    streak++;
    document.getElementById('scoreChip').textContent = `${score} pts`;
    document.getElementById('feedbackBox').innerHTML = `✅ <span class="fb-word">Correct!</span> <em class="fb-example">"${w.example}"</em>`;
  } else {
    btn.classList.add('wrong');
    streak = 0;
    document.getElementById('feedbackBox').innerHTML = `❌ The correct answer was: <span class="fb-word">${w.meaning}</span><em class="fb-example"> "${w.example}"</em>`;
  }
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= 10) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  showScreen('result');
  const pct = Math.round((score / 100) * 100);
  document.getElementById('resultRing').style.setProperty('--pct', pct);
  document.getElementById('resultNum').textContent = score;
  document.getElementById('resultDen').textContent = '/ 100';
  let grade, icon, title;
  if (pct >= 90) { grade = 'A'; icon = '🏆'; title = 'Outstanding!'; }
  else if (pct >= 70) { grade = 'B'; icon = '🎯'; title = 'Well Done!'; }
  else if (pct >= 50) { grade = 'C'; icon = '📚'; title = 'Keep Going!'; }
  else { grade = 'D'; icon = '💪'; title = 'Keep Practicing!'; }
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSubtitle').textContent = `You scored ${score} out of 100`;
  const gradeEl = document.getElementById('resultGrade');
  gradeEl.textContent = `Grade ${grade}`;
  gradeEl.className = `result-grade grade-${grade}`;
  mastered = Math.max(mastered, Math.floor(score / 10));
  document.getElementById('masteredCount').textContent = mastered;
  document.getElementById('streakCount').textContent = streak;
}

/* FLASHCARD */
let fcFlipped = false;
function loadFlashcard() {
  fcFlipped = false;
  document.getElementById('flashcardWrap').classList.remove('flipped');
  const w = WORDS[fcIndex];
  document.getElementById('fcPos').textContent = w.pos;
  document.getElementById('fcPos2').textContent = w.pos;
  document.getElementById('fcWord').textContent = w.word;
  document.getElementById('fcMeaning').textContent = w.meaning;
  document.getElementById('fcExample').textContent = `"${w.example}"`;
  document.getElementById('fcCounter').textContent = `${fcIndex + 1} / ${WORDS.length}`;
}
function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('flashcardWrap').classList.toggle('flipped', fcFlipped);
}
function fcMove(dir) {
  fcIndex = (fcIndex + dir + WORDS.length) % WORDS.length;
  fcFlipped = false;
  document.getElementById('flashcardWrap').classList.remove('flipped');
  setTimeout(loadFlashcard, 50);
}

// PWA SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
loadFlashcard();
